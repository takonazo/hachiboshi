<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project:Meteor 関連資料 | 八星製薬株式会社</title>
    <meta name="description" content="八星製薬株式会社のProject:Meteor関連資料ページです。">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html#top" aria-label="八星製薬株式会社 トップへ">
        <img class="brand-logo" src="assets/logo.svg" alt="八星製薬ロゴ">
        <span>
          <strong>八星製薬株式会社</strong>
          <small>Hachiboshi Pharmaceutical</small>
        </span>
      </a>
      <nav class="global-nav" aria-label="主要ナビゲーション">
        <a href="index.html#news">お知らせ</a>
        <a href="index.html#business">事業内容</a>
        <a href="index.html#research">研究開発</a>
        <a href="index.html#company">会社概要</a>
        <a href="search.html">サイト内検索</a>
      </nav>
      <form class="header-search" action="search.html" method="get" role="search">
        <label class="sr-only" for="meteor-search">サイト内検索</label>
        <input id="meteor-search" name="q" type="search" placeholder="サイト内検索">
        <button type="submit">検索</button>
      </form>
    </header>

    <main>
      <section class="page-hero meteor-hero">
        <div class="section-inner">
          <p class="section-label">Restricted File</p>
          <h1>Project:Meteor 関連資料</h1>
          <p>社内確認用に保管された参考資料です。閲覧記録は品質保証室に共有されます。</p>
        </div>
      </section>

      <section class="section-inner meteor-panel">
        <div class="section-heading">
          <p class="section-label">Image Records</p>
          <h2>添付画像</h2>
          <p>画像データは準備中です。必要な資料がそろい次第、下記の枠内に追加してください。</p>
        </div>

        <div class="meteor-image-grid">
          <figure class="meteor-image-frame">
            <div class="meteor-image-placeholder">
              <span>画像 01</span>
              <small>観察記録</small>
            </div>
            <figcaption>初期確認資料</figcaption>
          </figure>
          <figure class="meteor-image-frame">
            <div class="meteor-image-placeholder">
              <span>画像 02</span>
              <small>分析結果</small>
            </div>
            <figcaption>品質評価室提出分</figcaption>
          </figure>
          <figure class="meteor-image-frame">
            <div class="meteor-image-placeholder">
              <span>画像 03</span>
              <small>現場記録</small>
            </div>
            <figcaption>研究開発本部控え</figcaption>
          </figure>
          <figure class="meteor-image-frame">
            <div class="meteor-image-placeholder">
              <span>画像 04</span>
              <small>共有待ち</small>
            </div>
            <figcaption>追加資料</figcaption>
          </figure>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div>
        <strong>八星製薬株式会社</strong>
        <p>〒100-0000 東京都千代田区星見町8-8-8</p>
      </div>
      <a class="footer-contact" href="mailto:info@example.com">info@example.com</a>
    </footer>
    <script src="hallucination-bee.js"></script>
  </body>
</html>
