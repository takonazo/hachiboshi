  <body>
    <header class="site-header">
      <a class="brand" href="index.html#top" aria-label="八星製薬株式会社 トップへ">
        <img class="brand-logo" src="assets/logo.svg" alt="八星製薬ロゴ">
        <span>
          <strong>八星製薬株式会社</strong>
          <small>Hachiboshi Pharmaceutical</small>
        </span>
      </a>
      <nav class="global-nav" aria-label="主要ナビゲーション">
        <a href="index.html#news">お知らせ</a>
        <a href="index.html#business">事業内容</a>
        <a href="index.html#research">研究開発</a>
        <a href="index.html#company">会社概要</a>
        <a href="search.html">サイト内検索</a>
      </nav>
      <form class="header-search" action="search.html" method="get" role="search">
        <label class="sr-only" for="newsletter-search">サイト内検索</label>
        <input id="newsletter-search" name="q" type="search" placeholder="サイト内検索">
        <button type="submit">検索</button>
      </form>
    </header>

    <main>
      <section class="page-hero newsletter-hero">
        <div class="section-inner">
          <p class="section-label">Internal Magazine</p>
          <h1>社内報「星だより」6月号</h1>
          <p>閲覧するには、正しい4色を正しい順番で選択してください。</p>
        </div>
      </section>

      <section class="section-inner color-lock-section">
        <div class="color-lock-card" data-color-gate>
          <div class="color-lock-header">
            <p class="section-label">Color Verification</p>
            <h2>閲覧コード入力</h2>
            <p>各マスの上下ボタンで色を切り替え、左から順に4色を指定してください。</p>
          </div>

          <div class="color-lock" data-color-lock aria-label="4色選択">
            <div class="color-slot" data-slot>
              <button type="button" data-step="prev" aria-label="前の候補">▲</button>
              <div class="color-square" data-square></div>
              <button type="button" data-step="next" aria-label="次の候補">▼</button>
            </div>
            <div class="color-slot" data-slot>
              <button type="button" data-step="prev" aria-label="前の候補">▲</button>
              <div class="color-square" data-square></div>
              <button type="button" data-step="next" aria-label="次の候補">▼</button>
            </div>
            <div class="color-slot" data-slot>
              <button type="button" data-step="prev" aria-label="前の候補">▲</button>
              <div class="color-square" data-square></div>
              <button type="button" data-step="next" aria-label="次の候補">▼</button>
            </div>
            <div class="color-slot" data-slot>
              <button type="button" data-step="prev" aria-label="前の候補">▲</button>
              <div class="color-square" data-square></div>
              <button type="button" data-step="next" aria-label="次の候補">▼</button>
            </div>
          </div>

          <div class="color-lock-actions">
            <button class="button primary" type="button" data-check-colors>確認</button>
            <p class="color-lock-message" data-color-message aria-live="polite"></p>
          </div>

          <div class="color-lock-hint powder-puzzle" data-powder-puzzle>
            <p class="powder-password-hint" data-powder-password-hint>
              パスワードは[<img src="assets/tanuki-password-hint.png" alt="たぬき">]
            </p>
            <div class="powder-puzzle-stage">
              <img class="powder-puzzle-image" data-powder-puzzle-image src="assets/powder-puzzle-illustration.png" alt="暗号解読用イラスト">
              <div class="powder-puzzle-hotspots" data-powder-puzzle-hotspots aria-label="イラスト選択">
                <button type="button" class="powder-puzzle-hotspot" data-puzzle-item="tanuki" style="--x: 11.4; --y: 9.6; --w: 9.2; --h: 11.5;" aria-label="たぬき"></button>
                <button type="button" class="powder-puzzle-hotspot" data-puzzle-item="kawauso" style="--x: 34.0; --y: 8.6; --w: 10.5; --h: 10.2;" aria-label="かわうそ"></button>
                <button type="button" class="powder-puzzle-hotspot" data-puzzle-item="stomach" style="--x: 52.0; --y: 21.6; --w: 7.4; --h: 11.2;" aria-label="胃"></button>
                <button type="button" class="powder-puzzle-hotspot" data-puzzle-item="maple" style="--x: 73.8; --y: 18.6; --w: 9.4; --h: 12.4;" aria-label="紅葉"></button>
                <button type="button" class="powder-puzzle-hotspot" data-puzzle-item="tooth" style="--x: 18.4; --y: 33.8; --w: 8.0; --h: 10.8;" aria-label="歯"></button>
                <button type="button" class="powder-puzzle-hotspot" data-puzzle-item="mosquito" style="--x: 84.3; --y: 48.4; --w: 9.2; --h: 11.4;" aria-label="蚊"></button>
                <button type="button" class="powder-puzzle-hotspot" data-puzzle-item="blood" style="--x: 25.4; --y: 62.0; --w: 5.4; --h: 11.0;" aria-label="血"></button>
                <button type="button" class="powder-puzzle-hotspot" data-puzzle-item="door" style="--x: 43.0; --y: 64.0; --w: 6.8; --h: 10.8;" aria-label="扉"></button>
                <button type="button" class="powder-puzzle-hotspot" data-puzzle-item="kokeshi" style="--x: 52.0; --y: 75.3; --w: 7.4; --h: 13.8;" aria-label="こけし"></button>
                <button type="button" class="powder-puzzle-hotspot" data-puzzle-item="parent-child" style="--x: 77.5; --y: 70.0; --w: 10.4; --h: 15.0;" aria-label="親子"></button>
                <button type="button" class="powder-puzzle-hotspot" data-puzzle-item="orange-bucket" style="--x: 8.8; --y: 77.0; --w: 11.0; --h: 13.5;" aria-label="みかん入りバケツ"></button>
              </div>
            </div>
          </div>
        </div>

        <div class="newsletter-preview" data-newsletter-content hidden>
          <p class="section-label">Unlocked</p>
          <h2>星だより 6月号</h2>
          <p>
            認証が完了しました。社内報画像を表示します。
          </p>
          <img class="newsletter-image" src="assets/shanaihou-38-2.png" alt="社内報 星だより 6月号">
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div>
        <strong>八星製薬株式会社</strong>
        <p>〒100-0000 東京都千代田区星見町8-8-8</p>
      </div>
      <a class="footer-contact" href="mailto:info@example.com">info@example.com</a>
    </footer>
    <script src="newsletter-june.js"></script>
    <script src="hallucination-bee.js"></script>
  </body>
</html>
