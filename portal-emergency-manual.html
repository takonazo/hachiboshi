<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>PJ:Meteor従業員向け緊急時マニュアル | 八星製薬株式会社</title>
    <meta name="description" content="PJ:Meteor従業員向け緊急時マニュアルの認証ページです。">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="portal-body">
    <main class="portal-document-shell">
      <a class="portal-back" href="staff-portal.html">社員ポータルへ戻る</a>

      <section class="portal-lock-layout" data-password-gate data-password="きたい|気体" data-session-key="hachiboshiManualUnlocked">
        <form class="portal-card portal-lock-card" data-password-form>
          <div>
            <p class="portal-card-label">Restricted Manual</p>
            <h1>PJ:Meteor従業員向け緊急時マニュアル</h1>
          </div>
          <p class="portal-lock-question" data-reveal-key="hachiboshiProjectMeteorUnlocked" data-reveal-text="赤い”はこ”の中にあるものは？">████████████████████████？</p>
          <label>
            <span>回答</span>
            <input data-password-input type="text" autocomplete="off" autocapitalize="off" placeholder="回答を入力">
          </label>
          <p class="portal-error" data-password-error hidden>回答が一致しません。入力内容を確認してください。</p>
          <button type="submit">閲覧する</button>
        </form>

        <article class="portal-secure-document" data-locked-content hidden>
          <p class="portal-card-label">Emergency Manual</p>
          <h1>PJ:Meteor従業員向け緊急時マニュアル</h1>
          <div class="manual-instruction-card">
            <p>
              解毒薬の調合方法は[追伸]<br>
              その後[Ⅶ]
            </p>
          </div>
          <img class="manual-reveal-image" src="assets/realized-poison-message.png" alt="毒物は箱の中の気体だったと斎藤に送ろう">
        </article>
      </section>
    </main>
    <script src="portal-lock.js"></script>
    <script src="hallucination-bee.js"></script>
  </body>
</html>
