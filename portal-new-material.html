<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>【厳秘】新たに発見された物質について | 八星製薬株式会社</title>
    <meta name="description" content="新たに発見された物質に関する資料の認証ページです。">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="portal-body">
    <main class="portal-document-shell">
      <a class="portal-back" href="staff-portal.html">社員ポータルへ戻る</a>

      <section class="portal-lock-layout" data-password-gate data-password="HSC-08" data-session-key="hachiboshiNewMaterialUnlocked">
        <form class="portal-card portal-lock-card" data-password-form>
          <div>
            <p class="portal-card-label">Confidential File</p>
            <h1>【厳秘】新たに発見された物質について</h1>
          </div>
          <p class="portal-lock-question">この資料の閲覧には個別共有されたパスワードが必要です。</p>
          <label>
            <span>パスワード</span>
            <input data-password-input type="password" autocomplete="off" placeholder="Password">
          </label>
          <p class="portal-error" data-password-error hidden>パスワードが一致しません。</p>
          <button type="submit">閲覧する</button>
        </form>

        <article class="portal-secure-document" data-locked-content hidden>
          <p class="portal-card-label">Material Note</p>
          <h1>【厳秘】新たに発見された物質について</h1>
          <p>
            本資料は、社内で確認された未整理情報を一時保存するためのものです。
            研究記録として扱う場合は、品質保証室の指示に従って正式な台帳へ転記してください。
          </p>
          <div class="secure-document-list">
            <section>
              <h2>状態</h2>
              <p>名称、分類、保管方法について確認中。外部資料への記載は禁止されています。</p>
            </section>
            <section>
              <h2>次回対応</h2>
              <p>担当者会議で命名規則および広報上の扱いを確認予定です。</p>
            </section>
          </div>
        </article>
      </section>
    </main>
    <script src="portal-lock.js"></script>
  </body>
</html>
