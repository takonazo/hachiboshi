<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>【厳秘】Project:Meteor | 八星製薬株式会社</title>
    <meta name="description" content="Project:Meteor資料の認証ページです。">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="portal-body">
    <main class="portal-document-shell">
      <a class="portal-back" href="staff-portal.html">社員ポータルへ戻る</a>

      <section class="portal-lock-layout" data-password-gate data-password="METEOR-06" data-session-key="hachiboshiProjectMeteorUnlocked">
        <form class="portal-card portal-lock-card" data-password-form>
          <div>
            <p class="portal-card-label">Confidential File</p>
            <h1>【厳秘】Project:Meteor</h1>
          </div>
          <p class="portal-lock-question">この資料の閲覧には個別共有されたパスワードが必要です。</p>
          <label>
            <span>パスワード</span>
            <input data-password-input type="password" autocomplete="off" placeholder="Password">
          </label>
          <p class="portal-error" data-password-error hidden>パスワードが一致しません。</p>
          <button type="submit">閲覧する</button>
        </form>

        <article class="portal-secure-document" data-locked-content hidden>
          <p class="portal-card-label">Project File</p>
          <h1>【厳秘】Project:Meteor</h1>
          <p>
            本ページはProject:Meteorの社内共有用メモです。正式な記録ではなく、関係部署間の確認事項を一時的に集約しています。
          </p>
          <div class="secure-document-list">
            <section>
              <h2>確認事項</h2>
              <p>広報対応、社内連絡、記録保全の担当範囲を再確認してください。</p>
            </section>
            <section>
              <h2>共有範囲</h2>
              <p>本件の情報は、承認された担当者以外へ転送しないでください。</p>
            </section>
          </div>
        </article>
      </section>
    </main>
    <button class="portal-audio-toggle" type="button" data-audio-toggle aria-label="BGMをミュート" title="BGMをミュート">
      <svg class="audio-icon audio-icon-on" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M4 9v6h4l5 4V5L8 9H4Z"></path>
        <path d="M16 8.5c1 .9 1.5 2.1 1.5 3.5S17 14.6 16 15.5"></path>
        <path d="M18.4 6.1A8 8 0 0 1 21 12a8 8 0 0 1-2.6 5.9"></path>
      </svg>
      <svg class="audio-icon audio-icon-off" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M4 9v6h4l5 4V5L8 9H4Z"></path>
        <path d="M17 9l5 5"></path>
        <path d="M22 9l-5 5"></path>
      </svg>
    </button>
    <audio data-portal-audio src="assets/silver-city-secret.mp3" preload="auto" loop></audio>
    <script src="portal-lock.js"></script>
    <script src="portal-audio.js"></script>
  </body>
</html>
