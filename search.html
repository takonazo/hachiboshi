<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>サイト内検索 | 八星製薬株式会社</title>
    <meta name="description" content="八星製薬株式会社のサイト内検索ページです。">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html#top" aria-label="八星製薬株式会社 トップへ">
        <img class="brand-logo" src="assets/logo.svg" alt="八星製薬ロゴ">
        <span>
          <strong>八星製薬株式会社</strong>
          <small>Hachiboshi Pharmaceutical</small>
        </span>
      </a>
      <nav class="global-nav" aria-label="主要ナビゲーション">
        <a href="index.html#news">お知らせ</a>
        <a href="index.html#business">事業内容</a>
        <a href="index.html#research">研究開発</a>
        <a href="index.html#company">会社概要</a>
      </nav>
      <form class="header-search" action="search.html" method="get" role="search">
        <label class="sr-only" for="header-search">サイト内検索</label>
        <input id="header-search" name="q" type="search" placeholder="サイト内検索">
        <button type="submit">検索</button>
        <div class="header-search-history" data-search-history hidden></div>
      </form>
    </header>

    <main>
      <section class="page-hero">
        <div class="section-inner">
          <p class="section-label">Search</p>
          <h1>サイト内検索</h1>
          <p>公開ページ内の情報を検索できます。</p>
        </div>
      </section>

      <section class="section-inner search-panel">
        <form class="large-search" action="search.html" method="get" role="search">
          <label for="page-search">検索キーワード</label>
          <div>
            <input id="page-search" data-search-input name="q" type="search" placeholder="キーワードを入力">
            <button class="button primary" type="submit">検索</button>
          </div>
          <p class="search-summary" data-search-summary aria-live="polite"></p>
        </form>
        <div class="search-results" data-search-results aria-live="polite">
          <p>キーワードを入力して検索してください。</p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div>
        <strong>八星製薬株式会社</strong>
        <p>〒100-0000 東京都千代田区星見町8-8-8</p>
      </div>
      <a class="footer-contact" href="mailto:info@example.com">info@example.com</a>
    </footer>
    <script src="search.js"></script>
    <script src="hallucination-bee.js"></script>
  </body>
</html>
